name: CI/CD — upload-orchestrator

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── 1. BUILD ────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Download dependencies
        run: go mod download

      - name: Compile
        run: go build -v -trimpath ./...

      - name: Vet
        run: go vet ./...

  # ─── 2. TESTES ───────────────────────────────────────────────────────────────
  test:
    name: Test
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Run tests (race detector + cobertura)
        run: go test -v -race -count=1 -coverprofile=coverage.out ./...

      - name: Coverage summary
        run: go tool cover -func=coverage.out 2>/dev/null || echo "Sem dados de cobertura ainda"

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-upload-orchestrator
          path: coverage.out
          if-no-files-found: ignore

  # ─── 3. DEPLOY (local) ───────────────────────────────────────────────────────
  deploy:
    name: Deploy (local)
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login no GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push imagem Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.sha }}
            ghcr.io/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Criar .env a partir dos secrets
        env:
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          MONGO_PASSWORD: ${{ secrets.MONGO_PASSWORD }}
          RABBITMQ_PASSWORD: ${{ secrets.RABBITMQ_PASSWORD }}
          MINIO_ROOT_PASSWORD: ${{ secrets.MINIO_ROOT_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          NEWRELIC_LICENSE_KEY: ${{ secrets.NEWRELIC_LICENSE_KEY }}
        run: |
          {
            printf 'POSTGRES_DB=orchestrator\n'
            printf 'POSTGRES_USER=orchestrator\n'
            printf 'POSTGRES_PASSWORD=%s\n' "$POSTGRES_PASSWORD"
            printf 'MONGO_USER=report\n'
            printf 'MONGO_PASSWORD=%s\n' "$MONGO_PASSWORD"
            printf 'MONGO_DB=reports\n'
            printf 'RABBITMQ_USER=guest\n'
            printf 'RABBITMQ_PASSWORD=%s\n' "$RABBITMQ_PASSWORD"
            printf 'RABBITMQ_VHOST=/\n'
            printf 'MINIO_ROOT_USER=minioadmin\n'
            printf 'MINIO_ROOT_PASSWORD=%s\n' "$MINIO_ROOT_PASSWORD"
            printf 'MINIO_BUCKET=diagrams\n'
            printf 'JWT_SECRET=%s\n' "$JWT_SECRET"
            printf 'LLM_API_KEY=%s\n' "$LLM_API_KEY"
            printf 'NEWRELIC_LICENSE_KEY=%s\n' "$NEWRELIC_LICENSE_KEY"
          } > .env
          chmod 600 .env

      - name: Deploy via Docker Compose
        run: docker compose up -d upload-orchestrator

      - name: Health check /ping
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8081/ping; then
              echo "upload-orchestrator saudável"
              exit 0
            fi
            sleep 2
          done
          echo "Health check falhou"
          docker compose logs upload-orchestrator
          exit 1
